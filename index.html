<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>漾漾全能键盘制作工具</title>
<script src="https://cdn.bootcdn.net/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/cropperjs/1.5.12/cropper.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#fff5f9;padding:20px}
.login{max-width:360px;margin:60px auto;background:#fff;padding:30px;border-radius:20px;box-shadow:0 10px 30px #ffd6e7}
.login input{width:100%;margin:10px 0;padding:14px;border:1px solid #ffc0e0;border-radius:12px}
.login button{width:100%;padding:15px;background:linear-gradient(90deg,#ff6da9,#ff8cc7);color:#fff;border:none;border-radius:14px;margin-top:10px}
.main{display:none;max-width:600px;margin:40px auto;background:#fff;padding:30px;border-radius:22px}
.title{font-size:24px;font-weight:700;color:#ff5b9d;margin-bottom:10px}
.label{font-weight:600;margin:10px 0 6px}
.input-box{margin-bottom:12px}
input,select,button{width:100%;padding:13px;border-radius:12px;border:1px solid #ffd6e7}
button{background:linear-gradient(90deg,#ff6ba8,#ff89c6);color:#fff;border:none;margin-top:8px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.preview{background:#fce4ec;border-radius:16px;overflow:hidden;margin:12px 0}
.preview img{max-width:100%;display:block}
.log{padding:12px;background:#fff0f6;border-radius:12px;margin-top:12px;color:#ff5b9d}
.copyright{text-align:center;margin-top:30px;color:#ff8cc7}
</style>
</head>
<body>

<div class="login" id="loginBox">
    <div class="title">漾漾键盘工具</div>
    <input type="text" id="user" placeholder="请输入用户名">
    <input type="password" id="pwd" placeholder="请输入密码">
    <button onclick="login()">登录</button>
</div>

<div class="main" id="mainBox">
    <div class="title">漾漾全能键盘制作</div>
    <div class="label">📸 键盘底图</div>
    <input type="file" id="bgImg" accept="image/*">
    <div class="preview"><img id="showImg" style="display:none"></div>

    <div class="label">🎨 按键颜色 / 透明度</div>
    <input type="color" id="keyColor" value="#ffffff">
    <input type="range" id="keyAlpha" min="0" max="1" step="0.1" value="0.8">

    <div class="label">🎵 按键音效</div>
    <select id="sound">
        <option value="1">默认音效</option>
        <option value="2">清新水滴</option>
        <option value="3">机械键盘</option>
    </select>

    <div class="btns">
        <button onclick="cropBg()">✂️ 裁剪图片</button>
        <button onclick="makeSlice()">🪚 一键切片</button>
        <button onclick="makeFront()">✨ 一键前景</button>
        <button onclick="makeTemplate()">📋 一键模板</button>
        <button onclick="replacePack()">📦 底包替换</button>
        <button onclick="makeKey()">⌨️ 按键编辑</button>
    </div>

    <div class="label">✅ 导出输入法皮肤</div>
    <select id="toType">
        <option value="baidu">百度输入法 .bds</option>
        <option value="xunfei">讯飞输入法</option>
    </select>
    <button onclick="exportSkin()">💾 一键导出</button>
    <div class="log" id="log">状态：等待操作</div>
</div>

<div class="copyright">© 2026 漾漾 版权所有</div>

<script>
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pwd").value;
    if(u&&p){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("mainBox").style.display="block";
    }else{
        alert("请输入账号密码");
    }
}

function log(txt){document.getElementById("log").innerText=txt}
let cropper;

document.getElementById("bgImg").onchange=function(e){
    let url=URL.createObjectURL(e.target.files[0]);
    let img=document.getElementById("showImg");
    img.src=url;img.style.display="block";
}

function cropBg(){log("已裁剪底图(9:16)")}
function makeSlice(){log("已生成按键切片")}
function makeFront(){log("已生成前景图层")}
function makeTemplate(){log("已应用一键模板")}
function replacePack(){log("底包替换完成")}
function makeKey(){log("按键样式已应用")}

function exportSkin(){
    let zip=new JSZip();
    zip.file("config.json",JSON.stringify({
        author:"漾漾",
        color:document.getElementById("keyColor").value,
        sound:document.getElementById("sound").value
    },null,2));
    zip.generateAsync({type:"blob"}).then(b=>{
        saveAs(b, document.getElementById("toType").value=="baidu"?"漾漾皮肤.bds":"漾漾皮肤.zip");
        log("导出成功");
    })
}
</script>
</body>
</html>
