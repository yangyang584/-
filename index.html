<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI键盘皮肤打标机</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}
body{background:linear-gradient(135deg,#f6f9ff 0%,#eef5ff 100%);min-height:100vh;padding:20px}
.card{max-width:520px;margin:50px auto;background:#ffffff;border-radius:20px;box-shadow:0 8px 30px rgba(34,118,228,0.08);padding:35px;position:relative}
.logo{font-size:24px;font-weight:800;color:#2E7DFF;margin-bottom:6px}
.desc{color:#666;font-size:15px;margin-bottom:30px}
.form-group{margin-bottom:22px}
.form-group label{display:block;margin-bottom:8px;font-weight:600;color:#333;font-size:15px}
input[type="file"]{width:100%;padding:14px 16px;border:2px dashed #cbd5e1;border-radius:14px;background:#fafbfc;cursor:pointer}
select{width:100%;padding:14px 16px;border:1px solid #e2e8f0;border-radius:14px;background:#fff;font-size:15px}
button{width:100%;padding:16px;border:none;border-radius:16px;background:linear-gradient(90deg,#2E7DFF,#3B8AFF);color:#fff;font-size:16px;font-weight:700;margin-top:8px;cursor:pointer}
button:active{transform:scale(0.98)}
.log-box{margin-top:20px;padding:14px 16px;background:#f0f7ff;border-radius:14px;color:#2E7DFF;font-size:14px;min-height:50px}
.success{color:#00b578;font-weight:600}
.copyright{text-align:center;margin-top:30px;color:#999;font-size:12px}
</style>
</head>
<body>

<div class="card">
    <div class="logo">AI键盘皮肤打标机</div>
    <div class="desc">支持百度输入法、讯飞输入法一键打包签名</div>

    <div class="form-group">
        <label>① 上传皮肤 ZIP 压缩包</label>
        <input type="file" id="zipFile" accept=".zip">
    </div>

    <div class="form-group">
        <label>② 选择输入法类型</label>
        <select id="skinType">
            <option value="baidu">百度输入法 → 生成 .bds</option>
            <option value="xunfei">讯飞输入法 → 生成 .ift</option>
        </select>
    </div>

    <button onclick="startMake()">✅ 开始打标并下载</button>

    <div class="log-box" id="logText">等待上传文件...</div>
</div>

<div class="copyright">由 AI 生成 · 专属皮肤制作工具</div>

<script>
const log = (text, isSuccess = false) => {
    const dom = document.getElementById('logText')
    dom.innerText = text
    if(isSuccess) dom.classList.add('success')
    else dom.classList.remove('success')
}

async function startMake(){
    const file = document.getElementById('zipFile').files[0]
    const type = document.getElementById('skinType').value
    if(!file){log('⚠️ 请先上传 ZIP 皮肤包');return}
    
    log('⏳ 正在解析文件，请稍候...')
    const zip = new JSZip()
    await zip.loadAsync(file)

    if(type === 'baidu'){
        zip.file('desc.json', JSON.stringify({
            name:"AI定制皮肤",
            author:"专属打标机",
            version:"1.0",
            platform:"android"
        },null,2))
        zip.file('config.xml', '<config><name>AI定制皮肤</name></config>')
    } else {
        zip.file('skin.json', JSON.stringify({
            skin_name:"讯飞AI皮肤",
            author:"maker",
            version:1
        },null,2))
    }

    zip.file('SIGN.txt', 'signed_by_ai_tool_v2')
    log('⏳ 正在生成安装包...')

    const ext = type === 'baidu' ? '.bds' : '.ift'
    const fileName = `AI定制皮肤${ext}`
    const blob = await zip.generateAsync({
        type:'blob',
        compression:'DEFLATE',
        compressionOptions:{level:6}
    })

    saveAs(blob, fileName)
    log(`✅ 打标完成！已下载：${fileName}`, true)
}
</script>
</body>
</html>
